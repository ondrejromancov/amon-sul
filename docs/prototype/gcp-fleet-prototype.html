<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet — personal GCP control plane</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14;
    --panel:#10141D;
    --card:#151B26;
    --card-hover:#1A2130;
    --border:#232B3A;
    --border-soft:#1B2230;
    --text:#E6EAF2;
    --muted:#8B94A7;
    --dim:#5A6376;
    --blue:#5B9DFF;
    --ok:#34D399;
    --warn:#FBBF24;
    --err:#F87171;
    --font-ui:'Space Grotesk',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-ui);
    font-size:14px;
    overflow:hidden;
  }
  ::selection{background:rgba(91,157,255,.35)}

  /* ---------- layout ---------- */
  #app{display:grid;grid-template-rows:52px 1fr 64px;grid-template-columns:240px 1fr;height:100vh}
  header{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:0 16px;border-bottom:1px solid var(--border-soft);background:var(--panel)}
  aside{grid-row:2/3;border-right:1px solid var(--border-soft);background:var(--panel);overflow-y:auto;padding:14px 10px}
  main{grid-row:2/3;position:relative;overflow:auto;
    background-image:radial-gradient(circle,#1C2433 1px,transparent 1px);
    background-size:22px 22px;
  }
  footer{grid-column:1/3;border-top:1px solid var(--border-soft);background:var(--panel);display:flex;align-items:center;overflow:hidden}

  /* ---------- header ---------- */
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.02em}
  .logo svg{display:block}
  .logo span{color:var(--dim);font-weight:400;font-size:12px;font-family:var(--font-mono)}
  .search{flex:1;max-width:420px;position:relative}
  .search input{
    width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:7px 12px 7px 32px;font-family:var(--font-mono);font-size:12px;outline:none;
  }
  .search input:focus{border-color:var(--blue)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
  .hspacer{flex:1}
  .errbtn{
    display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
    border-radius:8px;padding:6px 12px;color:var(--text);cursor:pointer;font-family:var(--font-mono);font-size:12px;
  }
  .errbtn:hover{border-color:var(--err)}
  .errbtn .count{background:rgba(248,113,113,.15);color:var(--err);border-radius:5px;padding:1px 7px;font-weight:600}
  .avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#5B9DFF,#34D399)}

  /* ---------- sidebar ---------- */
  .fleetstats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--border-soft);border-radius:8px;padding:8px 10px}
  .stat b{display:block;font-size:18px;font-weight:600}
  .stat span{font-size:10px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}
  .stat.err b{color:var(--err)}
  .sidelabel{font-size:10px;font-family:var(--font-mono);color:var(--dim);text-transform:uppercase;letter-spacing:.08em;padding:0 6px;margin-bottom:8px}
  .projitem{
    display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:8px;cursor:pointer;
    border:1px solid transparent;margin-bottom:2px;
  }
  .projitem:hover{background:var(--card)}
  .projitem.active{background:var(--card);border-color:var(--border)}
  .projitem .pname{font-size:13px;font-weight:500;line-height:1.2}
  .projitem .pid{font-size:10px;color:var(--dim);font-family:var(--font-mono)}
  .projitem .pcount{margin-left:auto;font-size:10px;color:var(--muted);font-family:var(--font-mono)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .dot.ok{background:var(--ok);box-shadow:0 0 6px rgba(52,211,153,.6)}
  .dot.warn{background:var(--warn);box-shadow:0 0 6px rgba(251,191,36,.6)}
  .dot.err{background:var(--err);box-shadow:0 0 6px rgba(248,113,113,.7)}
  .dot.idle{background:var(--dim)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .dot.err{animation:pulse 1.6s ease-in-out infinite}

  /* ---------- canvas ---------- */
  #canvas{padding:36px 40px 60px;display:flex;flex-wrap:wrap;gap:44px;align-items:flex-start;min-width:min-content}
  .group{position:relative}
  .ghead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .ghead h2{font-size:15px;font-weight:600}
  .ghead .gid{font-size:11px;color:var(--dim);font-family:var(--font-mono)}
  .ghead a{font-size:11px;color:var(--blue);text-decoration:none;font-family:var(--font-mono);opacity:0;transition:opacity .15s}
  .group:hover .ghead a{opacity:1}
  .ghead a:hover{text-decoration:underline}
  .gbadge{font-size:10px;font-family:var(--font-mono);padding:1px 7px;border-radius:5px;border:1px solid var(--border)}
  .gbadge.err{color:var(--err);border-color:rgba(248,113,113,.4)}
  .gbadge.warn{color:var(--warn);border-color:rgba(251,191,36,.4)}
  .board{position:relative;border:1px dashed var(--border);border-radius:14px;background:rgba(16,20,29,.45)}
  .board svg.wires{position:absolute;inset:0;pointer-events:none}
  .wire{stroke:#3A4557;stroke-width:1.4;fill:none;stroke-dasharray:5 5}
  .group:hover .wire{stroke:#4A5A75;animation:dashflow 1.2s linear infinite}
  @keyframes dashflow{to{stroke-dashoffset:-10}}

  .node{
    position:absolute;width:200px;background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:11px 12px;cursor:pointer;transition:border-color .15s,transform .15s,opacity .2s;
  }
  .node:hover{border-color:var(--blue);transform:translateY(-1px)}
  .node.selected{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
  .node.dimmed{opacity:.18;pointer-events:none}
  .nrow{display:flex;align-items:center;gap:8px}
  .nicon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none}
  .nname{font-size:13px;font-weight:600;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ntype{font-size:10px;color:var(--dim);font-family:var(--font-mono)}
  .nstatus{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:11px;color:var(--muted);font-family:var(--font-mono)}

  /* ---------- drawer ---------- */
  #drawer{
    position:fixed;top:52px;right:0;bottom:64px;width:380px;background:var(--panel);
    border-left:1px solid var(--border);transform:translateX(100%);transition:transform .22s ease;
    display:flex;flex-direction:column;z-index:30;
  }
  #drawer.open{transform:translateX(0)}
  .dhead{padding:16px 18px 12px;border-bottom:1px solid var(--border-soft)}
  .dhead .top{display:flex;align-items:center;gap:10px}
  .dhead h3{font-size:16px;font-weight:600;flex:1}
  .dclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px}
  .dclose:hover{color:var(--text)}
  .dmeta{font-size:11px;color:var(--dim);font-family:var(--font-mono);margin-top:5px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--font-mono);
    padding:2px 9px;border-radius:6px;margin-top:9px;border:1px solid var(--border)}
  .pill.ok{color:var(--ok);border-color:rgba(52,211,153,.4)}
  .pill.warn{color:var(--warn);border-color:rgba(251,191,36,.4)}
  .pill.err{color:var(--err);border-color:rgba(248,113,113,.4)}
  .pill.idle{color:var(--muted)}
  .dbody{flex:1;overflow-y:auto;padding:16px 18px}
  .dsection{margin-bottom:22px}
  .dsection h4{font-size:10px;font-family:var(--font-mono);color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
  .linkrow{display:flex;gap:8px;flex-wrap:wrap}
  .clink{
    display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--font-mono);
    color:var(--blue);text-decoration:none;background:var(--card);border:1px solid var(--border);
    padding:6px 10px;border-radius:7px;
  }
  .clink:hover{border-color:var(--blue)}
  .spark{width:100%;height:56px;background:var(--card);border:1px solid var(--border-soft);border-radius:8px}
  .sparkcap{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);font-family:var(--font-mono);margin-top:5px}
  .cfgrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .cfgrow label{flex:1;font-size:12px;color:var(--muted)}
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .stepper button{background:var(--card);border:none;color:var(--text);width:26px;height:26px;cursor:pointer;font-size:14px}
  .stepper button:hover{background:var(--card-hover)}
  .stepper span{width:40px;text-align:center;font-family:var(--font-mono);font-size:12px;background:var(--panel)}
  .envrow{display:flex;gap:6px;margin-bottom:6px}
  .envrow input{
    background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);
    padding:5px 8px;font-family:var(--font-mono);font-size:11px;outline:none;min-width:0;
  }
  .envrow input:focus{border-color:var(--blue)}
  .envrow .k{width:38%}
  .envrow .v{flex:1}
  .savebtn{
    width:100%;background:var(--blue);color:#0B0E14;border:none;border-radius:8px;padding:9px;
    font-family:var(--font-ui);font-weight:600;font-size:13px;cursor:pointer;margin-top:6px;
  }
  .savebtn:hover{filter:brightness(1.1)}
  .errentry{border-left:2px solid var(--err);padding:7px 10px;margin-bottom:8px;background:var(--card);border-radius:0 7px 7px 0}
  .errentry .emsg{font-size:12px;line-height:1.4}
  .errentry .etime{font-size:10px;color:var(--dim);font-family:var(--font-mono);margin-top:3px}
  .errentry.warn{border-left-color:var(--warn)}
  .emptystate{font-size:12px;color:var(--dim);font-family:var(--font-mono)}

  /* ---------- event rail ---------- */
  .railcap{flex:none;padding:0 16px;font-size:10px;font-family:var(--font-mono);color:var(--dim);
    text-transform:uppercase;letter-spacing:.08em;border-right:1px solid var(--border-soft);height:100%;display:flex;align-items:center;gap:8px}
  .raildot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
  #rail{display:flex;gap:10px;align-items:center;overflow-x:auto;padding:0 14px;flex:1;scrollbar-width:none}
  #rail::-webkit-scrollbar{display:none}
  .event{
    flex:none;display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border-soft);
    border-radius:8px;padding:7px 12px;cursor:pointer;font-size:11px;font-family:var(--font-mono);color:var(--muted);
  }
  .event:hover{border-color:var(--border)}
  .event b{color:var(--text);font-weight:500}
  .event .etag{font-size:9px;padding:1px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
  .event.err .etag{background:rgba(248,113,113,.15);color:var(--err)}
  .event.warn .etag{background:rgba(251,191,36,.13);color:var(--warn)}
  .event.info .etag{background:rgba(91,157,255,.13);color:var(--blue)}
  .event.fresh{animation:flashin .8s ease}
  @keyframes flashin{0%{border-color:var(--err);box-shadow:0 0 12px rgba(248,113,113,.35)}100%{}}

  /* ---------- toast ---------- */
  #toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--card);border:1px solid var(--ok);color:var(--text);padding:10px 18px;border-radius:9px;
    font-size:13px;transition:all .25s;z-index:50;pointer-events:none;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast b{color:var(--ok)}

  @media (prefers-reduced-motion: reduce){
    *,.dot.err,.raildot{animation:none !important;transition:none !important}
  }
  main:focus-visible,button:focus-visible,input:focus-visible,a:focus-visible,.node:focus-visible,.projitem:focus-visible,.event:focus-visible{
    outline:2px solid var(--blue);outline-offset:2px;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="5" cy="5" r="2.4" fill="#5B9DFF"/>
        <circle cx="15" cy="5" r="2.4" fill="#34D399"/>
        <circle cx="5" cy="15" r="2.4" fill="#FBBF24"/>
        <circle cx="15" cy="15" r="2.4" fill="#F87171"/>
        <path d="M7 5h6M5 7v6M15 7v6M7 15h6" stroke="#3A4557" stroke-width="1.2"/>
      </svg>
      Fleet <span>· personal GCP control plane</span>
    </div>
    <div class="search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8B94A7" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="searchInput" type="text" placeholder="filter services, projects…" aria-label="Filter services">
    </div>
    <div class="hspacer"></div>
    <button class="errbtn" id="errBtn">errors <span class="count" id="errCount">0</span></button>
    <div class="avatar" title="ondrej@"></div>
  </header>

  <aside>
    <div class="fleetstats">
      <div class="stat"><b id="stProjects">0</b><span>projects</span></div>
      <div class="stat"><b id="stServices">0</b><span>services</span></div>
      <div class="stat err"><b id="stErrors">0</b><span>errors 24h</span></div>
      <div class="stat"><b id="stCost">$41</b><span>est / mo</span></div>
    </div>
    <div class="sidelabel">GCP projects</div>
    <nav id="projList"></nav>
  </aside>

  <main id="mainScroll">
    <div id="canvas"></div>
  </main>

  <footer>
    <div class="railcap"><span class="raildot"></span>live</div>
    <div id="rail" aria-label="Recent events"></div>
  </footer>

</div>

<div id="drawer" aria-hidden="true"></div>
<div id="toast"></div>

<script>
/* =============== mock data =============== */

};

function consoleLinks(node, projectId){
  const r = node.region || 'europe-west1';
  switch(node.type){
    case 'run': return [
      {t:'service', u:`https://console.cloud.google.com/run/detail/${r}/${node.slug}/metrics?project=${projectId}`},
      {t:'logs', u:`https://console.cloud.google.com/logs/query;query=resource.labels.service_name%3D%22${node.slug}%22?project=${projectId}`},
      {t:'revisions', u:`https://console.cloud.google.com/run/detail/${r}/${node.slug}/revisions?project=${projectId}`}];
    case 'sql': return [
      {t:'instance', u:`https://console.cloud.google.com/sql/instances/${node.slug}/overview?project=${projectId}`},
      {t:'backups', u:`https://console.cloud.google.com/sql/instances/${node.slug}/backups?project=${projectId}`}];
    case 'pubsub': return [
      {t:'topic', u:`https://console.cloud.google.com/cloudpubsub/topic/detail/${node.slug}?project=${projectId}`}];
    case 'storage': return [
      {t:'bucket', u:`https://console.cloud.google.com/storage/browser/${node.slug}?project=${projectId}`}];
    case 'scheduler': return [
      {t:'jobs', u:`https://console.cloud.google.com/cloudscheduler?project=${projectId}`}];
    case 'redis': return [
      {t:'instance', u:`https://console.cloud.google.com/memorystore/redis/locations/${r}/instances/${node.slug}/details?project=${projectId}`}];
    case 'vm': return [
      {t:'instance', u:`https://console.cloud.google.com/compute/instancesDetail/zones/${r}-b/instances/${node.slug}?project=${projectId}`},
      {t:'serial log', u:`https://console.cloud.google.com/compute/instancesDetail/zones/${r}-b/instances/${node.slug}?project=${projectId}&tab=serialconsole`}];
  }
  return [];
}

  },
  {
    id:'ml-lab', name:'ML Lab', region:'europe-west4', status:'idle',
    board:{w:470, h:230},
    nodes:[
      {id:'ml-vm', slug:'gpu-box', name:'gpu-box', type:'vm', x:20, y:70, status:'idle', statusText:'TERMINATED · a2-highgpu-1g',
        config:{env:[['machine','a2-highgpu-1g'],['gpu','1× A100 40GB'],['disk','500 GB pd-ssd']]}},
      {id:'ml-gcs', slug:'ml-lab-datasets', name:'datasets', type:'storage', x:250, y:70, status:'ok', statusText:'218 GB · nearline'},
    ],
    edges:[['ml-vm','ml-gcs']]
  },
];

let ERRORS = [
  {id:1, sev:'err', proj:'ledgerlite-staging', node:'ll-api', msg:'ECONNREFUSED 10.44.0.2:5432 — connection pool exhausted', time:'2m ago'},
  {id:2, sev:'err', proj:'ledgerlite-staging', node:'ll-api', msg:'Startup probe failed: container exited (1)', time:'6m ago'},
  {id:3, sev:'warn', proj:'rankforge-prod', node:'rf-worker', msg:'p95 latency 3.1s exceeds SLO 2.0s', time:'18m ago'},
  {id:4, sev:'info', proj:'rankforge-prod', node:'rf-api', msg:'Deployed revision api-00092 (100% traffic)', time:'2h ago'},
  {id:5, sev:'warn', proj:'rankforge-prod', node:'rf-sql', msg:'Disk utilisation 61% — projected full in 40 days', time:'5h ago'},
  {id:6, sev:'info', proj:'pulseboard-prod', node:'pb-app', msg:'Scheduled scale-down to min 1 instance', time:'7h ago'},
];
let nextErrId = 7;

/* =============== helpers =============== */
const $ = s => document.querySelector(s);
const nodeById = id => { for(const p of PROJECTS){ const n = p.nodes.find(n=>n.id===id); if(n) return {n, p}; } return null; };
const NODE_W = 200, NODE_H = 76;

/* =============== sidebar =============== */
function renderSidebar(){
  const list = $('#projList'); list.innerHTML = '';
  PROJECTS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'projitem'; el.tabIndex = 0;
    el.innerHTML = `<span class="dot ${p.status}"></span>
      <div><div class="pname">${p.name}</div><div class="pid">${p.id}</div></div>
      <span class="pcount">${p.nodes.length}</span>`;
    el.onclick = () => {
      document.querySelectorAll('.projitem').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('g-'+p.id).scrollIntoView({behavior:'smooth', inline:'start', block:'nearest'});
    };
    el.onkeydown = e => { if(e.key==='Enter') el.click(); };
    list.appendChild(el);
  });
  $('#stProjects').textContent = PROJECTS.length;
  $('#stServices').textContent = PROJECTS.reduce((a,p)=>a+p.nodes.length,0);
  const errCount = ERRORS.filter(e=>e.sev==='err').length;
  $('#stErrors').textContent = errCount;
  $('#errCount').textContent = errCount;
}

/* =============== canvas =============== */
function renderCanvas(){
  const canvas = $('#canvas'); canvas.innerHTML = '';
  PROJECTS.forEach(p => {
    const g = document.createElement('section');
    g.className = 'group'; g.id = 'g-'+p.id;
    const badge = p.status==='err' ? '<span class="gbadge err">1 failing</span>'
                : p.status==='warn' ? '<span class="gbadge warn">degraded</span>' : '';
    g.innerHTML = `
      <div class="ghead">
        <h2>${p.name}</h2><span class="gid">${p.id} · ${p.region}</span>${badge}
        <a href="https://console.cloud.google.com/home/dashboard?project=${p.id}" target="_blank" rel="noopener">open in console ↗</a>
      </div>
      <div class="board" style="width:${p.board.w}px;height:${p.board.h}px">
        <svg class="wires" width="${p.board.w}" height="${p.board.h}">${wires(p)}</svg>
      </div>`;
    const board = g.querySelector('.board');
    p.nodes.forEach(n => {
      const icon = ICONS[n.type];
      const el = document.createElement('div');
      el.className = 'node'; el.dataset.nodeId = n.id; el.tabIndex = 0;
      el.style.left = n.x+'px'; el.style.top = n.y+'px';
      el.setAttribute('role','button');
      el.setAttribute('aria-label', `${n.name}, ${icon.label}, status ${n.status}`);
      el.innerHTML = `
        <div class="nrow">
          <div class="nicon" style="background:${icon.bg}">${icon.svg}</div>
          <div style="min-width:0"><div class="nname">${n.name}</div><div class="ntype">${icon.label}</div></div>
        </div>
        <div class="nstatus"><span class="dot ${n.status}"></span>${n.statusText}</div>`;
      el.onclick = () => openDrawer(n.id);
      el.onkeydown = e => { if(e.key==='Enter') openDrawer(n.id); };
      board.appendChild(el);
    });
    canvas.appendChild(g);
  });
}

function wires(p){
  return p.edges.map(([a,b]) => {
    const na = p.nodes.find(n=>n.id===a), nb = p.nodes.find(n=>n.id===b);
    const x1 = na.x + NODE_W, y1 = na.y + NODE_H/2;
    const x2 = nb.x,          y2 = nb.y + NODE_H/2;
    // if target is left of source, route from left side instead
    let sx = x1, tx = x2;
    if (nb.x + NODE_W/2 < na.x + NODE_W/2){ sx = na.x; tx = nb.x + NODE_W; }
    const mx = (sx + tx)/2;
    return `<path class="wire" d="M ${sx} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${tx} ${y2}"/>`;
  }).join('');
}

/* =============== drawer =============== */
let drawerNodeId = null;

function openDrawer(nodeId){
  const found = nodeById(nodeId); if(!found) return;
  const {n, p} = found;
  drawerNodeId = nodeId;
  document.querySelectorAll('.node').forEach(el=>el.classList.toggle('selected', el.dataset.nodeId===nodeId));
  const icon = ICONS[n.type];
  const links = consoleLinks(n, p.id)
    .map(l=>`<a class="clink" href="${l.u}" target="_blank" rel="noopener">${l.t} ↗</a>`).join('');
  const nodeErrors = ERRORS.filter(e=>e.node===n.id);
  const statusLabel = {ok:'healthy', warn:'degraded', err:'failing', idle:'stopped'}[n.status];

  let configHtml = '<div class="emptystate">no editable config for this resource</div>';
  if (n.config){
    const steppers = ('minInstances' in n.config) ? `
      <div class="cfgrow"><label>min instances</label>
        <div class="stepper"><button data-step="minInstances:-1">−</button><span id="v-min">${n.config.minInstances}</span><button data-step="minInstances:1">+</button></div></div>
      <div class="cfgrow"><label>max instances</label>
        <div class="stepper"><button data-step="maxInstances:-1">−</button><span id="v-max">${n.config.maxInstances}</span><button data-step="maxInstances:1">+</button></div></div>` : '';
    const envs = (n.config.env||[]).map((kv,i)=>`
      <div class="envrow">
        <input class="k" value="${kv[0]}" data-env="${i}:0" aria-label="variable name">
        <input class="v" value="${kv[1]}" data-env="${i}:1" aria-label="variable value">
      </div>`).join('');
    configHtml = steppers + envs + `<button class="savebtn" id="saveCfg">Save changes</button>`;
  }

  const drawer = $('#drawer');
  drawer.innerHTML = `
    <div class="dhead">
      <div class="top">
        <div class="nicon" style="background:${icon.bg}">${icon.svg}</div>
        <h3>${n.name}</h3>
        <button class="dclose" aria-label="Close panel">✕</button>
      </div>
      <div class="dmeta">${icon.label} · ${p.id} · ${n.region || p.region}</div>
      <span class="pill ${n.status}"><span class="dot ${n.status}"></span>${statusLabel}</span>
    </div>
    <div class="dbody">
      <div class="dsection"><h4>GCP console</h4><div class="linkrow">${links}</div></div>
      <div class="dsection"><h4>${n.type==='sql'?'connections':'requests'} · 1h</h4>
        <canvas class="spark" id="sparkCanvas" width="680" height="112"></canvas>
        <div class="sparkcap"><span>-60m</span><span>now</span></div>
      </div>
      <div class="dsection"><h4>configuration</h4>${configHtml}</div>
      <div class="dsection"><h4>recent errors</h4>
        ${nodeErrors.length ? nodeErrors.map(e=>`
          <div class="errentry ${e.sev==='warn'?'warn':''}">
            <div class="emsg">${e.msg}</div><div class="etime">${e.time} · ${e.proj}</div>
          </div>`).join('') : '<div class="emptystate">no errors in the last 24h ✓</div>'}
      </div>
    </div>`;
  drawer.classList.add('open');
  drawer.setAttribute('aria-hidden','false');

  drawer.querySelector('.dclose').onclick = closeDrawer;
  drawer.querySelectorAll('[data-step]').forEach(btn => btn.onclick = () => {
    const [key, d] = btn.dataset.step.split(':');
    n.config[key] = Math.max(0, n.config[key] + Number(d));
    if (key==='maxInstances') n.config[key] = Math.max(n.config[key], n.config.minInstances||0);
    $('#v-min').textContent = n.config.minInstances;
    $('#v-max').textContent = n.config.maxInstances;
  });
  drawer.querySelectorAll('[data-env]').forEach(inp => inp.onchange = () => {
    const [i, j] = inp.dataset.env.split(':').map(Number);
    n.config.env[i][j] = inp.value;
  });
  const save = drawer.querySelector('#saveCfg');
  if (save) save.onclick = () => {
    const rev = Math.floor(Math.random()*40)+93;
    toast(`<b>Saved.</b> New revision ${n.slug}-00${rev} rolling out on ${p.id}`);
    pushEvent({sev:'info', proj:p.id, node:n.id, msg:`Config updated — revision ${n.slug}-00${rev} deploying`, time:'just now'});
  };
  drawSpark(n.status);
}

function closeDrawer(){
  $('#drawer').classList.remove('open');
  $('#drawer').setAttribute('aria-hidden','true');
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('selected'));
  drawerNodeId = null;
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });

function drawSpark(status){
  const c = $('#sparkCanvas'); if(!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height, N = 60;
  const pts = [];
  let v = 0.4 + Math.random()*0.2;
  for(let i=0;i<N;i++){
    v += (Math.random()-0.5)*0.12;
    v = Math.min(0.9, Math.max(0.08, v));
    if(status==='err' && i>N-12) v = Math.max(0.02, v-0.09*(i-(N-12)));  // requests fall off a cliff
    if(status==='idle') v = 0.04;
    pts.push(v);
  }
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  pts.forEach((p,i)=>{ const x = i/(N-1)*W, y = H - p*H*0.86 - 6; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.strokeStyle = status==='err' ? '#F87171' : '#5B9DFF';
  ctx.lineWidth = 2.4; ctx.stroke();
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, status==='err' ? 'rgba(248,113,113,.22)' : 'rgba(91,157,255,.22)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.fill();
}

/* =============== event rail & errors =============== */
function renderRail(){
  const rail = $('#rail'); rail.innerHTML = '';
  ERRORS.slice(0, 12).forEach(e => rail.appendChild(eventEl(e)));
}
function eventEl(e, fresh=false){
  const found = nodeById(e.node);
  const el = document.createElement('div');
  el.className = `event ${e.sev}${fresh?' fresh':''}`; el.tabIndex = 0;
  el.innerHTML = `<span class="etag">${e.sev}</span><b>${found ? found.n.name : e.node}</b><span>${e.msg.length>52 ? e.msg.slice(0,52)+'…' : e.msg}</span><span style="color:var(--dim)">${e.time}</span>`;
  el.onclick = () => openDrawer(e.node);
  el.onkeydown = ev => { if(ev.key==='Enter') el.click(); };
  return el;
}
function pushEvent(e){
  e.id = nextErrId++;
  ERRORS.unshift(e);
  const rail = $('#rail');
  rail.prepend(eventEl(e, true));
  if (rail.children.length > 12) rail.lastChild.remove();
  renderSidebar();
}

$('#errBtn').onclick = () => {
  const errs = ERRORS.filter(e=>e.sev!=='info');
  const drawer = $('#drawer');
  drawer.innerHTML = `
    <div class="dhead">
      <div class="top"><h3>Errors & warnings</h3><button class="dclose" aria-label="Close panel">✕</button></div>
      <div class="dmeta">all projects · last 24h</div>
    </div>
    <div class="dbody">
      ${errs.map(e=>`
        <div class="errentry ${e.sev==='warn'?'warn':''}" style="cursor:pointer" data-jump="${e.node}">
          <div class="emsg">${e.msg}</div>
          <div class="etime">${e.time} · ${e.proj}</div>
        </div>`).join('')}
    </div>`;
  drawer.classList.add('open');
  drawer.setAttribute('aria-hidden','false');
  drawer.querySelector('.dclose').onclick = closeDrawer;
  drawer.querySelectorAll('[data-jump]').forEach(el => el.onclick = () => openDrawer(el.dataset.jump));
};

/* =============== search =============== */
$('#searchInput').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.node').forEach(el => {
    if(!q){ el.classList.remove('dimmed'); return; }
    const found = nodeById(el.dataset.nodeId);
    const hay = `${found.n.name} ${found.n.slug} ${ICONS[found.n.type].label} ${found.p.id} ${found.p.name}`.toLowerCase();
    el.classList.toggle('dimmed', !hay.includes(q));
  });
});

/* =============== toast =============== */
let toastTimer;
function toast(html){
  const t = $('#toast');
  t.innerHTML = html;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}

/* =============== simulated live feed =============== */
const SIMULATED = [
  {sev:'err',  proj:'ledgerlite-staging', node:'ll-api', msg:'ECONNREFUSED 10.44.0.2:5432 — connection pool exhausted'},
  {sev:'err',  proj:'ledgerlite-staging', node:'ll-api', msg:'Uncaught TypeError: cannot read properties of undefined (fx.rate)'},
  {sev:'warn', proj:'rankforge-prod',     node:'rf-worker', msg:'Crawl batch retried 3× — SERP endpoint 429'},
  {sev:'info', proj:'pulseboard-prod',    node:'pb-app', msg:'Health check OK across 2 instances'},
];
let simIdx = 0;
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
  setInterval(()=>{
    const t = SIMULATED[simIdx++ % SIMULATED.length];
    pushEvent({...t, time:'just now'});
  }, 9000);
}

/* =============== init =============== */
renderSidebar();
renderCanvas();
renderRail();
</script>
